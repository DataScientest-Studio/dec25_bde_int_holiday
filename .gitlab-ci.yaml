stages:
  - test
  - build
  - deploy

variables:
  POSTGRES_DB: holiday
  POSTGRES_USER: holiday
  POSTGRES_PASSWORD: holiday

# ──────────────────────────────────────
# STAGE 1: TEST
# ────────────────────────────────────��─
lint:
  stage: test
  image: python:3.11-slim
  tags:
    - docker
  before_script:
    - pip install --no-cache-dir flake8
  script:
    - flake8 src/ --max-line-length=120 --ignore=E128,E305,E402,E501,E722,W291,W293,W391,W503,F401,F541,F841,C901
  allow_failure: true

unit-tests:
  stage: test
  image: python:3.11-slim
  tags:
    - docker
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends postgresql-client
    - pip install --no-cache-dir -r requirements.txt pytest pytest-cov
    - until pg_isready -h postgres -U holiday; do sleep 1; done
    - PGPASSWORD=holiday psql -h postgres -U holiday -d holiday -f sql/init.sql || true
    - PGPASSWORD=holiday psql -h postgres -U holiday -d holiday -f sql/02_schema_migration.sql || true
  script:
    - pytest tests/ -v --cov=src --cov-report=term-missing || echo "No tests found, skipping"
  allow_failure: true

# ──────────────────────────────────────
# STAGE 2: BUILD Docker Images
# ──────────────────────────────────────
build-api:
  stage: build
  image: docker:24.0
  tags:
    - docker
  services:
    - docker:24.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/api:latest -f Dockerfile.api .
    - docker push $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/api:latest
  only:
    - main

build-dashboard:
  stage: build
  image: docker:24.0
  tags:
    - docker
  services:
    - docker:24.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/dashboard:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/dashboard:latest -f Dockerfile.dashboard .
    - docker push $CI_REGISTRY_IMAGE/dashboard:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/dashboard:latest
  only:
    - main

build-scheduler:
  stage: build
  image: docker:24.0
  tags:
    - docker
  services:
    - docker:24.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/scheduler:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/scheduler:latest -f Dockerfile.scheduler .
    - docker push $CI_REGISTRY_IMAGE/scheduler:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/scheduler:latest
  only:
    - main

# ──────────────────────────────────────
# STAGE 3: DEPLOY
# ──────────────────────────────────────
deploy:
  stage: deploy
  tags:
    - docker
  before_script:
    # Install kubectl
    - choco install kubernetes-cli -y; $true
    # Configure cluster access (set KUBECONFIG in GitLab CI/CD Variables)
    - $env:KUBECONFIG = "$CI_PROJECT_DIR/kubeconfig"
  script:
    - echo "Deploying to Kubernetes..."
    - kubectl apply -f k8s/namespace.yaml
    - kubectl apply -f k8s/secrets.yaml
    - kubectl apply -f k8s/configmap.yaml
    - kubectl apply -f k8s/postgres.yaml
    - kubectl apply -f k8s/neo4j.yaml
    - kubectl apply -f k8s/api.yaml
    - kubectl apply -f k8s/dashboard.yaml
    - kubectl apply -f k8s/scheduler.yaml
    - kubectl apply -f k8s/ingress.yaml
    # Update images to latest
    - kubectl -n holiday set image deployment/api api=$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHORT_SHA
    - kubectl -n holiday set image deployment/dashboard dashboard=$CI_REGISTRY_IMAGE/dashboard:$CI_COMMIT_SHORT_SHA
    - kubectl -n holiday set image deployment/scheduler scheduler=$CI_REGISTRY_IMAGE/scheduler:$CI_COMMIT_SHORT_SHA
    # Wait for rollout
    - kubectl -n holiday rollout status deployment/api --timeout=120s
    - kubectl -n holiday rollout status deployment/dashboard --timeout=120s
  environment:
    name: production
  only:
    - main
  when: manual