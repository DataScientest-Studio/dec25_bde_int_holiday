version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: holiday_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: holiday
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holiday -d holiday"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - holiday_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: holiday_api
    environment:
      - DATABASE_URL=postgresql://holiday:holiday@postgres:5432/holiday
      - PYTHONUNBUFFERED=1
      - DOCKER_ENV=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=holiday
      - POSTGRES_PASSWORD=holiday
      - POSTGRES_DB=holiday
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./sql:/app/sql
      - ml_models:/app/src/ml/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - holiday_network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: holiday_dashboard
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      DOCKER_ENV: "true"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src/dashboard:/app/src/dashboard
    networks:
      - holiday_network

  batch_pipeline:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: holiday_batch_pipeline
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: holiday
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
      API_BASE_URL: http://api:8000
      DATABASE_URL: postgresql://holiday:holiday@postgres:5432/holiday
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: python -m src.pipelines.batch_etl
    profiles:
      - manual
    networks:
      - holiday_network

  holiday_scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: holiday_scheduler
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: holiday
      POSTGRES_USER: holiday
      POSTGRES_PASSWORD: holiday
      DATABASE_URL: postgresql://holiday:holiday@postgres:5432/holiday
      DATATOURISME_API_KEY: ${DATATOURISME_API_KEY:-}
      DATATOURISME_BASE_URL: ${DATATOURISME_BASE_URL:-https://api.datatourisme.fr}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - ./src:/app/src:ro
      - ./sql:/app/sql:ro
      - scheduler_logs:/var/log
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - holiday_network

  neo4j:
    image: neo4j:5.15-community
    container_name: holiday_neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - holiday_network

volumes:
  postgres_data:
  scheduler_logs:
  neo4j_data:
  neo4j_logs:
  ml_models:

networks:
  holiday_network:
    driver: bridge