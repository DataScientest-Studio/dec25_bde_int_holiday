apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: holiday
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: registry.gitlab.com/miulina-group/holiday_machine_project/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: holiday-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: POSTGRES_PASSWORD
            - name: DATATOURISME_API_KEY
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: DATATOURISME_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: holiday
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000