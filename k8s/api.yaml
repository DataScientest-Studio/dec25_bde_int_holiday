apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: holiday
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: holiday-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: holiday-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: POSTGRES_PASSWORD
            - name: DATATOURISME_API_KEY
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: DATATOURISME_API_KEY
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: NEO4J_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: holiday
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080