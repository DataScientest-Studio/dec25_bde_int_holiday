apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: holiday
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: holiday-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: holiday-config
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: holiday
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30050