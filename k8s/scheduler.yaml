apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: holiday
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: holiday-scheduler:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: holiday-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: POSTGRES_PASSWORD
            - name: DATATOURISME_API_KEY
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: DATATOURISME_API_KEY
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: holiday-secrets
                  key: NEO4J_PASSWORD